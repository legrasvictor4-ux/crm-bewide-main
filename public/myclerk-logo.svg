<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 74">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&amp;display=swap');
    </style>
  </defs>

  <!-- Badge : cercle de base + 16 disques pour les bosses (même logique que le vrai logo) -->
  <g fill="#1a1a2e">
    <circle cx="37" cy="37" r="30"/>
    <!-- 16 bosses régulières, commençant en haut -->
    <circle cx="37"    cy="7"     r="4.5"/><!-- 0: -90° top -->
    <circle cx="48.48" cy="9.28"  r="4.5"/><!-- 1: -67.5° -->
    <circle cx="58.21" cy="15.79" r="4.5"/><!-- 2: -45° -->
    <circle cx="64.72" cy="25.52" r="4.5"/><!-- 3: -22.5° -->
    <circle cx="67"    cy="37"    r="4.5"/><!-- 4: 0° right -->
    <circle cx="64.72" cy="48.48" r="4.5"/><!-- 5: +22.5° -->
    <circle cx="58.21" cy="58.21" r="4.5"/><!-- 6: +45° -->
    <circle cx="48.48" cy="64.72" r="4.5"/><!-- 7: +67.5° -->
    <circle cx="37"    cy="67"    r="4.5"/><!-- 8: +90° bottom -->
    <circle cx="25.52" cy="64.72" r="4.5"/><!-- 9: +112.5° -->
    <circle cx="15.79" cy="58.21" r="4.5"/><!-- 10: +135° -->
    <circle cx="9.28"  cy="48.48" r="4.5"/><!-- 11: +157.5° -->
    <circle cx="7"     cy="37"    r="4.5"/><!-- 12: +180° left -->
    <circle cx="9.28"  cy="25.52" r="4.5"/><!-- 13: +202.5° -->
    <circle cx="15.79" cy="15.79" r="4.5"/><!-- 14: +225° -->
    <circle cx="25.52" cy="9.28"  r="4.5"/><!-- 15: +247.5° -->
  </g>

  <!-- Yeux : sclère blanche + pupille sombre -->
  <!-- Œil gauche -->
  <circle cx="28"   cy="37"   r="7.2" fill="white"/>
  <circle cx="29.2" cy="35.8" r="3.3" fill="#1a1a2e"/>
  <!-- Œil droit -->
  <circle cx="46"   cy="37"   r="7.2" fill="white"/>
  <circle cx="47.2" cy="35.8" r="3.3" fill="#1a1a2e"/>

  <!-- Texte "myclerk" — remplacer la police par celle du vrai logo si disponible -->
  <text
    x="86" y="57"
    font-family="'Nunito', 'Space Grotesk', 'Arial Rounded MT Bold', Arial, sans-serif"
    font-weight="900"
    font-size="52"
    fill="#1a1a2e"
    letter-spacing="-0.5"
  >myclerk</text>
</svg>
